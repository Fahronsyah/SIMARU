<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIMARU - Sistem Manajemen Arsip Rumah Sakit</title>
  <style>
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --font-mono: "Courier New", monospace;
      --border-radius-lg: 8px;
      --border-radius-md: 6px;
      --color-text-primary: #1a3a5c;
      --color-text-secondary: #64748b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: var(--font-sans);
      background: #eef2f7;
    }
    
    .wrap {
      padding: 1.25rem;
    }
    
    .header {
      background: #1a3a5c;
      border-radius: var(--border-radius-lg);
      padding: 0;
      margin-bottom: 1.25rem;
      overflow: hidden;
      display: flex;
      align-items: stretch;
    }
    
    .hstripe {
      width: 6px;
      background: #d4af37;
      flex-shrink: 0;
    }
    
    .hbody {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.1rem 1.5rem;
      flex: 1;
      flex-wrap: wrap;
    }
    
    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-right: 1rem;
      border-right: 1px solid rgba(255, 255, 255, 0.15);
      flex-shrink: 0;
    }
    
    .logo-emblem {
      width: 46px;
      height: 46px;
    }
    
    .ltxt {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    
    .ltxt .l1 {
      font-size: 9px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    
    .ltxt .l2 {
      font-size: 11px;
      font-weight: 500;
      color: #fff;
      line-height: 1.35;
    }
    
    .htitle {
      padding-left: 0.75rem;
      flex: 1;
    }
    
    .htitle h1 {
      font-size: 20px;
      font-weight: 500;
      color: #d4af37;
      letter-spacing: 0.02em;
    }
    
    .htitle p {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.65);
      margin-top: 2px;
    }
    
    .hdate {
      text-align: right;
      flex-shrink: 0;
    }
    
    .hdate .d1 {
      font-size: 16px;
      font-weight: 500;
      color: #d4af37;
    }
    
    .hdate .d2 {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 2px;
    }

    .notif {
      display: none;
      align-items: center;
      gap: 8px;
      background: #fff8e6;
      border: 0.5px solid #e6c96c;
      border-radius: var(--border-radius-md);
      padding: 0.65rem 1rem;
      margin-bottom: 1.25rem;
      font-size: 12px;
      color: #7a5900;
    }
    
    .notif.show {
      display: flex;
    }
    
    .notif svg {
      width: 15px;
      height: 15px;
      fill: #c9930a;
      flex-shrink: 0;
    }

    .kpi-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 1.25rem;
    }
    
    .kpi {
      background: #fff;
      border: 0.5px solid #dde3ed;
      border-radius: var(--border-radius-md);
      padding: 0.85rem 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }
    
    .kpi::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
    }
    
    .kpi.kb::before {
      background: #185fa5;
    }
    
    .kpi.kn::before {
      background: #1a3a5c;
    }
    
    .kpi.kg::before {
      background: #0f6e56;
    }
    
    .kpi.kr::before {
      background: #a32d2d;
    }
    
    .kpi-ico {
      width: 36px;
      height: 36px;
      border-radius: var(--border-radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    
    .kpi-ico svg {
      width: 17px;
      height: 17px;
    }
    
    .kb .kpi-ico {
      background: #e6f1fb;
    }
    
    .kb .kpi-ico svg {
      fill: #185fa5;
    }
    
    .kn .kpi-ico {
      background: #e8edf4;
    }
    
    .kn .kpi-ico svg {
      fill: #1a3a5c;
    }
    
    .kg .kpi-ico {
      background: #eaf3de;
    }
    
    .kg .kpi-ico svg {
      fill: #3b6d11;
    }
    
    .kr .kpi-ico {
      background: #fcebeb;
    }
    
    .kr .kpi-ico svg {
      fill: #a32d2d;
    }
    
    .kpi-lbl {
      font-size: 11px;
      color: var(--color-text-secondary);
      margin-bottom: 2px;
    }
    
    .kpi-val {
      font-size: 22px;
      font-weight: 500;
    }
    
    .kb .kpi-val {
      color: #185fa5;
    }
    
    .kn .kpi-val {
      color: #1a3a5c;
    }
    
    .kg .kpi-val {
      color: #0f6e56;
    }
    
    .kr .kpi-val {
      color: #a32d2d;
    }

    .tabs {
      display: flex;
      background: #fff;
      border: 0.5px solid #dde3ed;
      border-radius: var(--border-radius-lg);
      overflow: hidden;
      margin-bottom: 1.25rem;
    }
    
    .tbtn {
      flex: 1;
      padding: 9px 6px;
      border: none;
      background: transparent;
      font-size: 12px;
      font-weight: 500;
      color: var(--color-text-secondary);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all 0.15s;
    }
    
    .tbtn svg {
      width: 13px;
      height: 13px;
      fill: currentColor;
    }
    
    .tbtn:hover {
      background: #f5f7fb;
      color: #1a3a5c;
    }
    
    .tbtn.on {
      color: #1a3a5c;
      border-bottom-color: #d4af37;
      background: #f0f4f9;
    }
    
    .tab-panel {
      display: none;
    }
    
    .tab-panel.on {
      display: block;
    }

    .scard {
      background: #fff;
      border: 0.5px solid #dde3ed;
      border-radius: var(--border-radius-lg);
      margin-bottom: 1.25rem;
      overflow: hidden;
    }
    
    .shead {
      padding: 0.85rem 1.25rem;
      border-bottom: 0.5px solid #eef0f4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .shead-l {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .shead h2 {
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-primary);
    }
    
    .shi {
      width: 26px;
      height: 26px;
      background: #e8edf4;
      border-radius: var(--border-radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .shi svg {
      width: 13px;
      height: 13px;
      fill: #1a3a5c;
    }
    
    .shead-r {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .fgrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      padding: 1.25rem;
    }
    
    .fg label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    
    .fg input,
    .fg select,
    .fg textarea {
      width: 100%;
      padding: 7px 11px;
      border: 0.5px solid #cdd4e0;
      border-radius: var(--border-radius-md);
      font-size: 13px;
      background: #fff;
      color: var(--color-text-primary);
    }
    
    .fg input:focus,
    .fg select:focus,
    .fg textarea:focus {
      outline: none;
      border-color: #2563a8;
      box-shadow: 0 0 0 3px rgba(37, 99, 168, 0.1);
    }
    
    .fg textarea {
      resize: vertical;
      min-height: 52px;
    }
    
    .fg.full {
      grid-column: 1/-1;
    }
    
    .btn-sub {
      padding: 8px 20px;
      background: #1a3a5c;
      color: #fff;
      border: none;
      border-radius: var(--border-radius-md);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .btn-sub:hover {
      background: #2563a8;
    }
    
    .btn-sec {
      padding: 8px 13px;
      background: transparent;
      color: var(--color-text-secondary);
      border: 0.5px solid #cdd4e0;
      border-radius: var(--border-radius-md);
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .btn-sec:hover {
      background: #f4f6fa;
    }
    
    .table-wrapper {
      overflow-x: auto;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      min-width: 1100px;
    }
    
    thead tr {
      background: #f5f7fb;
    }
    
    thead th {
      padding: 9px 11px;
      text-align: left;
      font-size: 10px;
      font-weight: 600;
      color: #4a6080;
      border-bottom: 0.5px solid #dde3ed;
      white-space: nowrap;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
    }
    
    thead th:hover {
      background: #edf1f7;
    }
    
    tbody tr {
      border-bottom: 0.5px solid #eef0f4;
      transition: background 0.12s;
    }
    
    tbody tr:last-child {
      border-bottom: none;
    }
    
    tbody tr:hover {
      background: #f9fafc;
    }
    
    td {
      padding: 10px 11px;
      vertical-align: middle;
      color: var(--color-text-primary);
    }
    
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }
    
    .b-pinjam {
      background: #e6f1fb;
      color: #0c447c;
    }
    
    .b-kembali {
      background: #eaf3de;
      color: #27500a;
    }
    
    .empty {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--color-text-secondary);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="hstripe"></div>
      <div class="hbody">
        <div class="logo-wrap">
          <div class="logo-emblem">
            <!-- Logo here -->
          </div>
          <div class="ltxt">
            <span class="l1">Rumah Sakit</span>
            <span class="l2">SIMARU</span>
          </div>
        </div>
        <div class="htitle">
          <h1>Sistem Manajemen Arsip</h1>
          <p>Manajemen arsip digital rumah sakit</p>
        </div>
        <div class="hdate">
          <div class="d1" id="current-date">-</div>
          <div class="d2" id="current-time">-</div>
        </div>
      </div>
    </div>

    <div class="scard">
      <div class="shead">
        <div class="shead-l">
          <h2>Data Arsip</h2>
        </div>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>No</th>
              <th>Nomor Dokumen</th>
              <th>Judul</th>
              <th>Status</th>
              <th>Tanggal</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>1</td>
              <td>DOC-001</td>
              <td>Laporan Tahunan</td>
              <td><span class="badge b-pinjam">Aktif</span></td>
              <td>2026-05-06</td>
            </tr>
            <tr>
              <td>2</td>
              <td>DOC-002</td>
              <td>Rekam Medis</td>
              <td><span class="badge b-kembali">Selesai</span></td>
              <td>2026-05-05</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="empty">
      <p>Konten SIMARU siap digunakan</p>
    </div>
  </div>

  <script>
    function updateDateTime() {
      const now = new Date();
      const dateStr = now.toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });
      const timeStr = now.toLocaleTimeString('id-ID');
      document.getElementById('current-date').textContent = dateStr;
      document.getElementById('current-time').textContent = timeStr;
    }
    
    updateDateTime();
    setInterval(updateDateTime, 1000);
  </script>
</body>
</html>
